<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Service Area | [COMPANY NAME]</title>
<link rel="canonical" href="https://www.[DOMAIN]/service-area-map.html" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.css" />
<style>
  :root {
    --brand:      #c41e3a;   /* BCH brand blue — exact site token */
    --brand-soft: rgba(196,30,58,0.06);
    --ink:        #1a1a1a;
    --ink-soft:   #5e6675;
    --paper:      #ffffff;
    --font: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  html, body { margin: 0; padding: 0; background: #f8faff; }

  .bch-wrap {
    display: flex;
    gap: 14px;
    width: 100%;
    height: 580px;
    font-family: var(--font);
  }
  #bch-map {
    flex: 1 1 auto;
    min-width: 0;
    height: 100%;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
  }

  /* ---------- scrollable city panel ---------- */
  .bch-panel {
    flex: 0 0 300px;
    height: 100%;
    overflow-y: auto;
    scroll-snap-type: y proximity;
    scroll-behavior: smooth;
    border-radius: 14px;
    background: transparent;
    scrollbar-width: thin;
    scrollbar-color: var(--brand) transparent;
  }
  .bch-panel::-webkit-scrollbar { width: 6px; }
  .bch-panel::-webkit-scrollbar-thumb { background: var(--brand); border-radius: 3px; }

  .bch-spacer { height: 90px; flex: 0 0 auto; }

  .bch-city {
    scroll-snap-align: center;
    background: var(--paper);
    border-radius: 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,.10);
    margin: 0 4px 14px;
    overflow: hidden;
    opacity: .55;
    transform: scale(.97);
    transition: opacity .25s ease, transform .25s ease, box-shadow .25s ease;
    cursor: pointer;
  }
  .bch-city.active {
    opacity: 1;
    transform: scale(1);
    box-shadow: 0 4px 18px rgba(196,30,58,.22);
  }
  .bch-city-img {
    height: 130px;
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-soft) 100%);
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .bch-city-img .initial {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 46px; font-weight: 700; color: rgba(255,255,255,.85);
  }
  .bch-city-img.has-photo .initial { display: none; }
  .bch-city-body { padding: 12px 15px 14px; }
  .bch-city-body .tag {
    display: inline-block;
    font-size: 10.5px; font-weight: 600;
    letter-spacing: .05em; text-transform: uppercase;
    color: var(--brand);
    margin-bottom: 4px;
  }
  .bch-city-body h3 { margin: 0 0 4px; font-size: 16.5px; color: var(--ink); }
  .bch-city-body p { margin: 0 0 8px; font-size: 13px; line-height: 1.5; color: var(--ink-soft); }
  .bch-city-body a {
    color: var(--brand); font-weight: 600; font-size: 13px; text-decoration: none;
  }
  .bch-city-body a:hover { text-decoration: underline; }

  /* ---------- markers ----------
     Outer .bch-marker is positioned by MapLibre (transform only).
     All visual effects live on inner .bch-pin to prevent drift during pan/zoom. */
  .bch-marker { width: 15px; height: 15px; cursor: pointer; }
  .bch-marker.home { width: 21px; height: 21px; }
  .bch-pin {
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--brand);
    border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,.35);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .bch-marker:hover .bch-pin { transform: scale(1.25); }
  .bch-marker.home .bch-pin {
    background: #fff;
    border: 5px solid var(--brand);
    box-sizing: border-box;
  }
  .bch-marker.active .bch-pin {
    transform: scale(1.4);
    box-shadow: 0 0 0 5px rgba(196,30,58,.25), 0 1px 4px rgba(0,0,0,.35);
  }

  /* ---------- legend ---------- */
  .bch-legend {
    position: absolute; left: 12px; bottom: 12px; z-index: 5;
    background: var(--paper);
    padding: 9px 13px;
    border-radius: 10px;
    box-shadow: 0 1px 6px rgba(0,0,0,.18);
    font: 12.5px/1.5 var(--font);
    color: var(--ink);
  }
  .bch-legend h4 { margin: 0 0 5px; font-size: 12.5px; font-weight: 600; }
  .bch-legend .row { display: flex; align-items: center; gap: 7px; margin: 2px 0; }
  .bch-dot { width: 11px; height: 11px; border-radius: 50%; background: var(--brand); flex: 0 0 auto; }
  .bch-dot.home { width: 13px; height: 13px; background: #fff; border: 3px solid var(--brand); box-sizing: border-box; }

  /* ---------- mobile: horizontal card strip under the map ---------- */
  @media (max-width: 760px) {
    .bch-wrap { flex-direction: column; height: auto; }
    #bch-map { height: 380px; border-radius: 10px; }
    .bch-panel {
      flex: 1 1 auto; height: auto;
      display: flex; gap: 10px;
      overflow-x: auto; overflow-y: hidden;
      scroll-snap-type: x proximity;
      padding: 4px 2px 10px;
    }
    .bch-spacer { width: 10vw; height: auto; flex: 0 0 auto; }
    .bch-city { flex: 0 0 78vw; margin: 0; scroll-snap-align: center; }
    .bch-city-img { height: 110px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .maplibregl-map *, .bch-pin, .bch-city { transition: none !important; animation: none !important; }
    .bch-panel { scroll-behavior: auto; }
  }
</style>
</head>
<body>
<div class="bch-wrap">
  <div id="bch-map" role="region" aria-label="[COMPANY NAME] service area across [COUNTY], [STATE]">
    <div class="bch-legend">
      <h4>We come to you</h4>
      <div class="row"><span class="bch-dot home"></span>Home base ([CITY])</div>
      <div class="row"><span class="bch-dot"></span>Service city</div>
    </div>
  </div>
  <nav class="bch-panel" id="bch-panel" aria-label="Cities we serve, scroll to explore"></nav>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.js"></script>
<script>
(function () {
  var cities = [
    {name:"[CITY]", lat:26.7144532, lng:-80.0549456, img:"",
     desc:"[CITY] is the county seat and downtown anchor, from the Flagler waterfront to Clematis Street. We bring concierge care directly to homes across the city, with telehealth visits available anytime. Surrounding neighborhoods and nearby communities are fully within our service area."},
    {name:"Boca Raton", lat:26.3683064, lng:-80.1289321, img:"",
     desc:"Boca Raton anchors the southern end of the county with its Mizner architecture and coastal elegance. Our providers come to you for in-home visits, and telehealth keeps care within reach between them. We also serve the surrounding South County communities."},
    {name:"Boynton Beach", lat:26.5317866, lng:-80.0905465, img:"",
     desc:"Boynton Beach sits between the Intracoastal and the Atlantic, anchored by its harbor marina. We provide concierge house calls throughout the city and telehealth wherever you are. The surrounding coastal and inland neighborhoods are covered as well."},
    {name:"Delray Beach", lat:26.4638471, lng:-80.0738334, img:"",
     desc:"Delray Beach pairs Atlantic Avenue charm with the Morikami Japanese Gardens. Whether by in-home visit or telehealth, our care comes to you, not the other way around. We serve Delray and the communities around it."},
    {name:"[CITY]", lat:26.6617635, lng:-80.2683571, home:true, img:"",
     desc:"[CITY] is our home base, the equestrian capital and the heart of our practice. From here we deliver concierge care to your door and telehealth on your schedule. The entire surrounding western communities corridor is our backyard."},
    {name:"[CITY]", lat:26.9318533, lng:-80.1023696, img:"",
     desc:"[CITY] marks the county's northern edge, watched over by its historic red brick lighthouse. Our concierge providers travel to you, with telehealth filling the moments in between. We also cover the surrounding north county coastline."},
    {name:"[COUNTY] Gardens", lat:26.8396096, lng:-80.1019144, img:"",
     desc:"[COUNTY] Gardens is known for its manicured boulevards and PGA National. We bring full concierge visits to your home and offer telehealth for everything that does not need one. Nearby north county communities are served as well."},
    {name:"Greenacres", lat:26.6276, lng:-80.1256, img:"",
     desc:"Greenacres is a central residential community just minutes from our [CITY] office. That proximity means fast, flexible in-home visits, with telehealth always available. We serve the city and its surrounding neighborhoods."},
    {name:"Lake Worth Beach", lat:26.6167555, lng:-80.0684479, img:"",
     desc:"Lake Worth Beach blends a historic pier, vibrant murals, and classic [STATE] character. Our care comes to your door, by house call or telehealth, on your schedule. The surrounding central coast communities are part of our coverage."},
    {name:"The Acreage / [CITY] Farms", lat:26.7820, lng:-80.2730, img:"",
     desc:"The Acreage and [CITY] Farms are the county's western horse country, where distance to care matters most. That is exactly where a come-to-you practice belongs, with telehealth bridging the miles. We serve these communities and the surrounding acreage."},
    {name:"[CITY]", lat:26.7083984, lng:-80.2306019, img:"",
     desc:"[CITY] is a family village built around Commons Park, right next door to [CITY]. Being neighbors means our in-home visits arrive quickly, and telehealth is a tap away. The surrounding western communities are covered too."},
    {name:"Riviera Beach", lat:26.7754, lng:-80.0581, img:"",
     desc:"Riviera Beach is the gateway to Peanut Island and the Blue Heron Bridge. We deliver concierge care at home and telehealth wherever the day takes you. Singer Island and the surrounding waterfront communities are included."},
    {name:"Palm Springs", lat:26.6354, lng:-80.0962, img:"",
     desc:"Palm Springs is a central village in the heart of the county. Its location puts it well within reach of our home visit routes, with telehealth always on hand. We serve the village and its surrounding neighborhoods."},
    {name:"North [COUNTY]", lat:26.8170, lng:-80.0581, img:"",
     desc:"North [COUNTY] offers waterfront living along the Lake Worth Lagoon. Our providers come to you, and telehealth covers the rest. The surrounding north county waterfront is part of our service area."},
    {name:"Lantana", lat:26.5868, lng:-80.0520, img:"",
     desc:"Lantana is a small coastal town with a historic working waterfront. We bring concierge visits to your home and telehealth to your screen. Hypoluxo and the surrounding coastal pockets are served as well."},
    {name:"[COUNTY]", lat:26.7056, lng:-80.0364, img:"",
     desc:"The Town of [COUNTY] is home to Worth Avenue, the Flagler Museum, and the Lake Trail. Discreet in-home concierge care is what we do, with telehealth as a seamless complement. We serve the island from inlet to inlet."},
    {name:"Lake Park", lat:26.8001, lng:-80.0681, img:"",
     desc:"Lake Park centers on its harbor marina and the historic Kelsey Theater. Our care travels to you, in person or by telehealth. The town and its surrounding lakefront neighborhoods are within our area."},
    {name:"Tequesta", lat:26.9645, lng:-80.1267, img:"",
     desc:"Tequesta sits on the [CITY] River at the county's northern tip. Even at the far edge of the county, our concierge visits reach you, with telehealth closing any gap. We serve the village and the surrounding river communities."},
    {name:"[CITY]", lat:26.7290, lng:-80.2540, img:"",
     desc:"[CITY] is the county's newest city, growing quickly in the central west. New community, same promise: we come to you, at home or by telehealth. The surrounding developments along Seminole Pratt are covered too."},
    {name:"Highland Beach", lat:26.3987, lng:-80.0656, img:"",
     desc:"Highland Beach is a quiet barrier island town between Delray and Boca. In-home concierge care suits island living, and telehealth makes it effortless. We serve the island and the neighboring coastal stretch."},
    {name:"Juno Beach", lat:26.8801, lng:-80.0534, img:"",
     desc:"Juno Beach is famous for its pier and sea turtle nesting shores. We bring our practice to your home and your devices, on your schedule. The surrounding beachside communities are part of our coverage."},
    {name:"Haverhill", lat:26.6912, lng:-80.1167, img:"",
     desc:"Haverhill is a small residential town near the center of the county. Central location, easy reach: our home visits and telehealth cover it completely. We serve Haverhill and the neighborhoods around it."},
    {name:"Atlantis", lat:26.5934, lng:-80.1006, img:"",
     desc:"Atlantis is a small city built around its country club greens. Quiet streets and an established community make in-home care a natural fit, with telehealth in support. The surrounding area is served as well."},
    {name:"Ocean Ridge", lat:26.5273, lng:-80.0473, img:"",
     desc:"Ocean Ridge is a quiet barrier island community east of Boynton. We come to you across the bridge, and telehealth requires no bridge at all. The neighboring island towns are within our area."},
    {name:"Gulf Stream", lat:26.4934, lng:-80.0617, img:"",
     desc:"Gulf Stream is a small coastal town of estates and sea grape lanes. Private, unhurried in-home care fits the town's character, and telehealth keeps it continuous. We serve Gulf Stream and its surroundings."},
    {name:"Manalapan", lat:26.5862, lng:-80.0531, img:"",
     desc:"Manalapan is an exclusive barrier island enclave south of [COUNTY]. Concierge medicine at your residence is precisely our model, complemented by telehealth. The surrounding island corridor is covered."},
    {name:"[CITY] Inlet Colony", lat:26.9476, lng:-80.0784, img:"",
     desc:"[CITY] Inlet Colony is a tiny seaside village at the mouth of the inlet. Small village, full service: home visits and telehealth both reach you here. We serve the colony and the surrounding inlet communities."},
    {name:"Glen Ridge", lat:26.6862, lng:-80.0917, img:"",
     desc:"Glen Ridge is one of [STATE]'s smallest towns, tucked beside [CITY]. Size is no barrier: our concierge visits and telehealth serve every resident. The surrounding central county area is covered too."},
    {name:"Cloud Lake", lat:26.6845, lng:-80.0903, img:"",
     desc:"Cloud Lake is a village of just a few hundred residents near the airport. We bring care to your door here just as we do countywide, with telehealth always available. The neighboring communities are part of our area."}
  ];

  /* Coverage polygon — [lng, lat] order for MapLibre.
     Eastern and central [COUNTY]; Glades excluded. Tune western edge before launch. */
  var coverage = [
    [-80.075, 26.97],
    [-80.300, 26.97],
    [-80.315, 26.62],
    [-80.235, 26.36],
    [-80.065, 26.335],
    [-80.030, 26.710],
    [-80.060, 26.945],
    [-80.075, 26.97]
  ];

  var brand = getComputedStyle(document.documentElement).getPropertyValue('--brand').trim() || '#c41e3a';

  var map = new maplibregl.Map({
    container: 'bch-map',
    style: 'https://tiles.openfreemap.org/styles/positron',
    center: [-80.16, 26.66],
    zoom: 9,
    attributionControl: { compact: true },
    cooperativeGestures: true
  });
  map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');

  function mapsLink(name) {
    return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(name + ', FL');
  }

  var panel = document.getElementById('bch-panel');
  var pins = [], cards = [];
  var activeIdx = -1;
  var suppressObserver = false;
  var suppressTimer = null;

  function setActive(idx, opts) {
    opts = opts || {};
    if (idx === activeIdx) return;
    if (activeIdx >= 0) {
      pins[activeIdx].classList.remove('active');
      cards[activeIdx].classList.remove('active');
    }
    activeIdx = idx;
    pins[idx].classList.add('active');
    cards[idx].classList.add('active');

    var c = cities[idx];
    map.easeTo({
      center: [c.lng, c.lat],
      zoom: 10.5,
      duration: window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 0 : 700
    });

    if (opts.scrollPanel) {
      suppressObserver = true;
      clearTimeout(suppressTimer);
      cards[idx].scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
      suppressTimer = setTimeout(function () { suppressObserver = false; }, 800);
    }
  }

  map.on('load', function () {
    // Fit to full service area bounding box on initial load
    map.fitBounds(
      [[-80.30, 26.33], [-80.02, 26.98]], // SW, NE — all 29 cities
      { padding: { top: 40, bottom: 40, left: 40, right: 40 }, maxZoom: 10, duration: 0 }
    );

    map.addSource('coverage', {
      type: 'geojson',
      data: { type: 'Feature', geometry: { type: 'Polygon', coordinates: [coverage] } }
    });
    map.addLayer({ id: 'coverage-fill', type: 'fill', source: 'coverage',
      paint: { 'fill-color': brand, 'fill-opacity': 0.10 } });
    map.addLayer({ id: 'coverage-line', type: 'line', source: 'coverage',
      paint: { 'line-color': brand, 'line-opacity': 0.6, 'line-width': 2 } });

    var topSpacer = document.createElement('div');
    topSpacer.className = 'bch-spacer';
    panel.appendChild(topSpacer);

    cities.forEach(function (c, i) {
      /* Pin: outer owns position (MapLibre), inner owns visuals (CSS) */
      var markerEl = document.createElement('div');
      markerEl.className = 'bch-marker' + (c.home ? ' home' : '');
      markerEl.setAttribute('role', 'button');
      markerEl.setAttribute('tabindex', '0');
      var label = c.home ? (c.name + ' (Home Base)') : c.name;
      markerEl.setAttribute('aria-label', label);

      var dot = document.createElement('div');
      dot.className = 'bch-pin';
      markerEl.appendChild(dot);

      new maplibregl.Marker({ element: markerEl }).setLngLat([c.lng, c.lat]).addTo(map);
      markerEl.addEventListener('click', function () { setActive(i, { scrollPanel: true }); });
      markerEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setActive(i, { scrollPanel: true }); }
      });
      pins.push(markerEl);

      /* Card */
      var card = document.createElement('article');
      card.className = 'bch-city';
      card.dataset.idx = i;
      card.innerHTML =
        '<div class="bch-city-img' + (c.img ? ' has-photo' : '') + '"' +
        (c.img ? ' style="background-image:url(\'' + c.img + '\')"' : '') + '>' +
        '<span class="initial">' + c.name.charAt(0) + '</span>' +
        '</div>' +
        '<div class="bch-city-body">' +
        '<span class="tag">' + (c.home ? 'Home Base' : 'Service City') + '</span>' +
        '<h3>' + label + '</h3>' +
        '<p>' + (c.desc || '') + '</p>' +
        '<a href="' + mapsLink(c.name) + '" target="_blank" rel="noopener">View on Google Maps</a>' +
        '</div>';
      card.addEventListener('click', function (e) {
        if (e.target.tagName === 'A') return;
        setActive(i, { scrollPanel: true });
      });
      panel.appendChild(card);
      cards.push(card);
    });

    var bottomSpacer = document.createElement('div');
    bottomSpacer.className = 'bch-spacer';
    panel.appendChild(bottomSpacer);

    var observer = new IntersectionObserver(function (entries) {
      if (suppressObserver) return;
      var best = null;
      entries.forEach(function (entry) {
        if (!entry.isIntersecting) return;
        if (!best || entry.intersectionRatio > best.intersectionRatio) best = entry;
      });
      if (best) {
        var idx = parseInt(best.target.dataset.idx, 10);
        setActive(idx);
      }
    }, {
      root: panel,
      rootMargin: '-38% 0px -38% 0px',
      threshold: [0, .25, .5, .75, 1]
    });
    cards.forEach(function (card) { observer.observe(card); });

    var homeIdx = cities.findIndex(function (c) { return c.home; });
    setTimeout(function () { setActive(homeIdx, { scrollPanel: true }); }, 300);
  });
})();
</script>
</body>
</html>
