[build]
  publish = "."

# -----------------------------------------------------------------------
# Staging: block indexing until DNS cutover to [DOMAIN]
# TO UNDO: remove the [[headers]] block below (the one with noindex)
# See reminder in planning/BCH-seo-location-strategy.md
# -----------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, follow"

# -----------------------------------------------------------------------
# Portal deactivation — 2026-06-18
# -----------------------------------------------------------------------
[[redirects]]
  from = "/updates"
  to = "/"
  status = 302

[[redirects]]
  from = "/updates/*"
  to = "/"
  status = 302

