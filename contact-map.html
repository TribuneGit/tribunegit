<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Location | [COMPANY NAME]</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.css" />
<style>
  :root {
    --brand: #c41e3a;
    --font: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  html, body { margin: 0; padding: 0; }
  #bch-map {
    width: 100%; height: 400px;
    border-radius: 12px; overflow: hidden;
    font-family: var(--font);
  }
  .bch-marker { width: 21px; height: 21px; cursor: default; }
  .bch-pin {
    width: 100%; height: 100%; border-radius: 50%;
    background: #fff;
    border: 5px solid var(--brand);
    box-sizing: border-box;
    box-shadow: 0 2px 8px rgba(196,30,58,.35);
  }
  .bch-legend {
    position: absolute; left: 12px; bottom: 12px; z-index: 5;
    background: #fff; padding: 9px 13px; border-radius: 10px;
    box-shadow: 0 1px 6px rgba(0,0,0,.18);
    font: 12.5px/1.5 var(--font); color: #1a1a1a;
  }
  .bch-legend h4 { margin: 0 0 3px; font-size: 12.5px; font-weight: 700; color: var(--brand); }
  .bch-legend p { margin: 0; font-size: 11.5px; color: #5e6675; }
  .maplibregl-map:focus { outline: 3px solid var(--brand); }
</style>
</head>
<body>
<div id="bch-map" role="region" aria-label="[COMPANY NAME] home base in [CITY], [STATE]">
  <div class="bch-legend">
    <h4>[COMPANY NAME]</h4>
    <p>Based in [CITY], FL. We come to you.</p>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.js"></script>
<script>
(function () {
  var map = new maplibregl.Map({
    container: 'bch-map',
    style: 'https://tiles.openfreemap.org/styles/positron',
    center: [-80.2683571, 26.6617635],
    zoom: 11,
    attributionControl: { compact: true },
    cooperativeGestures: true
  });
  map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');

  map.on('load', function () {
    var markerEl = document.createElement('div');
    markerEl.className = 'bch-marker';
    markerEl.setAttribute('aria-label', '[COMPANY NAME], [CITY] FL');
    var dot = document.createElement('div');
    dot.className = 'bch-pin';
    markerEl.appendChild(dot);
    new maplibregl.Marker({ element: markerEl })
      .setLngLat([-80.2683571, 26.6617635])
      .setPopup(new maplibregl.Popup({ offset: 14 }).setHTML(
        '<div style="font:13px/1.5 sans-serif;color:#1a1a1a;">' +
        '<strong style="color:#c41e3a;">[COMPANY NAME]</strong><br>' +
        '[CITY, STATE ZIP]<br>' +
        '<a href="https://www.google.com/maps/search/?api=1&query=Beyond+Concierge+Healthcare+[CITY]+FL" ' +
        'target="_blank" rel="noopener" style="color:#c41e3a;font-weight:600;">Get directions</a>' +
        '</div>'
      ))
      .addTo(map);
  });
})();
</script>
</body>
</html>
